name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build and Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-15'
            rust-target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-15-intel'
            rust-target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-24.04'
            rust-target: ''
            args: '--bundles deb,rpm,appimage'
          - platform: 'windows-2025'
            rust-target: ''
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust
        if: matrix.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libxdo-dev rpm

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          # Windows dependencies are handled by Tauri

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          xcode-select -p

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Generate Cargo lockfile
        run: cargo generate-lockfile --manifest-path src-tauri/Cargo.toml

      - name: Check Rust crate
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build frontend
        run: npm run build:tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Gestore Pub ${{ github.ref_name }}'
          releaseBody: |
            ## Gestore Pub ${{ github.ref_name }}
            
            ### Download
            - **Windows**: `gestore-pub_${{ github.ref_name }}_windows_x64.msi` / `.exe`
            - **macOS (Apple Silicon)**: `gestore-pub_${{ github.ref_name }}_macos_aarch64.dmg`
            - **macOS (Intel)**: `gestore-pub_${{ github.ref_name }}_macos_x64.dmg`
            - **Linux**: `gestore-pub_${{ github.ref_name }}_linux_amd64.AppImage` / `.deb` / `.rpm`
            
            ### Changelog
            Vedi [CHANGELOG.md](https://github.com/Francy2009/Gestore-pub/blob/main/CHANGELOG.md) per i dettagli.
          args: ${{ matrix.args }}
